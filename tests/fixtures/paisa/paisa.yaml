# paisa.yaml — Paisa 0.7.4 config (schema-valid, offline-safe).
# Generated by scripts.synth; regenerate with
#   uv run python -m scripts.synth generate
# Verified against the ananthakumaran/paisa:0.7.4 config schema:
#   required=[journal_path, db_path], additionalProperties=false.

journal_path: main.ledger
db_path: paisa.db
ledger_cli: ledger
default_currency: INR
amount_alignment_column: 52
locale: en-IN
time_zone: Asia/Kolkata

budget:
  rollover: yes

schedule_al:
  - code: bank
    accounts:
      - Assets:Bank:*
  - code: liability
    accounts:
      - Liabilities:Card:*
  - code: share
    accounts:
      - Equity:Opening Balances

allocation_targets:
  - name: Bank
    target: 100
    accounts:
      - Assets:Bank:*

goals:
  retirement:
    - name: Emergency
      icon: mdi:lifebuoy
      swr: 4
      savings:
        - Assets:Bank:*
      expenses:
        - Expenses:*
  savings:
    - name: Savings
      icon: mdi:piggy
      target: 1000000
      accounts:
        - Assets:Bank:*

commodities:
  - name: USD
    type: unknown
    price:
      provider: co-alphavantage
      code: USD

credit_cards:
  - account: Liabilities:Card:HDFCMillenniaCC
    credit_limit: 150000
    statement_end_day: 8
    due_day: 20
    network: visa
    number: "4242"
    expiration_date: "2029-05-01"
